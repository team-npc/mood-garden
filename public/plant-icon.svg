<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="stemGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ade80"/>
      <stop offset="100%" style="stop-color:#22c55e"/>
    </linearGradient>
    <linearGradient id="leafGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#86efac"/>
      <stop offset="100%" style="stop-color:#4ade80"/>
    </linearGradient>
    <linearGradient id="flowerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fda4af"/>
      <stop offset="100%" style="stop-color:#f472b6"/>
    </linearGradient>
    <linearGradient id="potGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4b87e"/>
      <stop offset="100%" style="stop-color:#9c6b3e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="50" cy="50" r="48" fill="#f6f7f6" stroke="#e3e6e3" stroke-width="2"/>
  
  <!-- Pot -->
  <path d="M30 75 L35 90 L65 90 L70 75 Z" fill="url(#potGradient)" stroke="#7f5335" stroke-width="1"/>
  <ellipse cx="50" cy="75" rx="20" ry="4" fill="url(#potGradient)" stroke="#7f5335" stroke-width="1"/>
  
  <!-- Soil -->
  <ellipse cx="50" cy="75" rx="18" ry="3" fill="#5d4037"/>
  
  <!-- Stem -->
  <path d="M50 75 Q48 60 50 45" stroke="url(#stemGradient)" stroke-width="4" fill="none" stroke-linecap="round"/>
  
  <!-- Left Leaf -->
  <path d="M48 60 Q35 55 30 45 Q38 50 48 55" fill="url(#leafGradient)" filter="url(#glow)"/>
  
  <!-- Right Leaf -->
  <path d="M52 55 Q65 50 70 40 Q62 48 52 52" fill="url(#leafGradient)" filter="url(#glow)"/>
  
  <!-- Flower Petals -->
  <g filter="url(#glow)">
    <ellipse cx="50" cy="35" rx="8" ry="12" fill="url(#flowerGradient)" transform="rotate(0 50 35)"/>
    <ellipse cx="50" cy="35" rx="8" ry="12" fill="url(#flowerGradient)" transform="rotate(72 50 35)"/>
    <ellipse cx="50" cy="35" rx="8" ry="12" fill="url(#flowerGradient)" transform="rotate(144 50 35)"/>
    <ellipse cx="50" cy="35" rx="8" ry="12" fill="url(#flowerGradient)" transform="rotate(216 50 35)"/>
    <ellipse cx="50" cy="35" rx="8" ry="12" fill="url(#flowerGradient)" transform="rotate(288 50 35)"/>
  </g>
  
  <!-- Flower Center -->
  <circle cx="50" cy="35" r="6" fill="#fde047" stroke="#fbbf24" stroke-width="1"/>
  
  <!-- Sparkles -->
  <circle cx="25" cy="25" r="2" fill="#fde047" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.3;0.8" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="75" cy="30" r="1.5" fill="#fde047" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="20" cy="60" r="1" fill="#fde047" opacity="0.7">
    <animate attributeName="opacity" values="0.7;0.2;0.7" dur="1.8s" repeatCount="indefinite"/>
  </circle>
</svg>
